services:
  surveillance-manager:
    build:
      context: .
      target: development
    image: surveillance-manager:latest
    container_name: surveillance-manager
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - /app/node_modules
    env_file:
      - .env
    environment:
      - NODE_ENV=development
    restart: unless-stopped
